version: "3.8"

services:
  # database section — unified PostgreSQL + PostGIS
  nexusdb:
    image: postgis/postgis:16-3.4
  basketdb:
    image: redis:alpine

  # infrastructure section
  rabbitmq:
    image: rabbitmq:3-management-alpine
  pgadmin:
    image: dpage/pgadmin4
  portainer:
    image: portainer/portainer-ce
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.2
  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.2

  #microservices api section
  product.api:
    image: ${DOCKER_REGISTRY-}product-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Product.API/Dockerfile

  customer.api:
    image: ${DOCKER_REGISTRY-}customer-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Customer.API/Dockerfile

  basket.api:
    image: ${DOCKER_REGISTRY-}basket-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Basket.API/Dockerfile

  ordering.api:
    image: ${DOCKER_REGISTRY-}ordering-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Ordering/Ordering.API/Dockerfile

  inventory.api:
    image: ${DOCKER_REGISTRY-}inventory-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Inventory.Product.API/Dockerfile

  payment.api:
    image: ${DOCKER_REGISTRY-}payment-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Payment.API/Dockerfile

  hangfire.api:
    image: ${DOCKER_REGISTRY-}hangfire-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Hangfire.API/Dockerfile

  identity.api:
    image: ${DOCKER_REGISTRY-}identity-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/Identity.API/Dockerfile

  flashsale.api:
    image: ${DOCKER_REGISTRY-}flashsale-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/FlashSale.API/Dockerfile

  groupbuy.api:
    image: ${DOCKER_REGISTRY-}groupbuy-api:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: Services/GroupBuy.API/Dockerfile

  # API Gateway section
  ocelot.apigw:
    image: ${DOCKER_REGISTRY-}ocelot-apigw:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: APIGateWays/OcelotApiGw/Dockerfile

  # WebApps section
  react.client:
    image: ${DOCKER_REGISTRY-}react-client:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: ./WebApps/React.Client
      dockerfile: Dockerfile

  webhealthstatus:
    image: ${DOCKER_REGISTRY-}webhealthstatus:${PLATFORM:-linux}-${TAG:-latest}
    build:
      context: .
      dockerfile: WebApps/WebHealthStatus/Dockerfile

  #network section
networks:
  default:
    name: viet_microservices
    driver: bridge

#volumes section
volumes:
  nexusdb_data:
    name: nexusdb_data
  portainer_data:
    name: portainer_data
  elasticsearch_data:
    name: elasticsearch_data
  jaeger_data:
    name: jaeger_data
  pgadmin_data:
    name: pgadmin_data
