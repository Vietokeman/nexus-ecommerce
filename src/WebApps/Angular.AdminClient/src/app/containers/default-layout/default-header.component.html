<c-header class="d-print-none nx-header" position="sticky">
  <c-container [fluid]="true" class="nx-header-wrap">
    <button
      [cSidebarToggle]="sidebarId"
      class="nx-sidebar-trigger"
      type="button"
      aria-label="Toggle sidebar"
    >
      <span class="nx-hamburger"><span></span></span>
    </button>

    <div class="nx-header-title-block">
      <span class="nx-header-eyebrow">Admin Console</span>
      <h1 class="nx-header-title">Nexus orchestration center</h1>
    </div>

    <c-header-nav class="nx-header-nav d-none d-lg-flex">
      <a
        class="nx-header-link"
        routerLink="/dashboard"
        routerLinkActive="active"
        >Tổng quan</a
      >
      <a
        class="nx-header-link"
        routerLink="/system/users"
        routerLinkActive="active"
        >Người dùng</a
      >
      <a
        class="nx-header-link"
        routerLink="/content/posts"
        routerLinkActive="active"
        >Bài viết</a
      >
    </c-header-nav>

    <div class="nx-header-actions d-none d-lg-flex" aria-label="Quick stats">
      <span class="nx-action-chip">12 mới</span>
      <span class="nx-action-chip">5 cần duyệt</span>
    </div>

    <c-dropdown alignment="end" variant="nav-item">
      <button
        cButton
        color=""
        [caret]="false"
        cDropdownToggle
        class="nx-profile-trigger"
        type="button"
      >
        <span class="nx-profile-avatar">VA</span>
        <span class="nx-profile-meta d-none d-md-inline-flex">
          <span class="nx-profile-name">Viet Admin</span>
          <span class="nx-profile-role">Super admin</span>
        </span>
      </button>

      <ul cDropdownMenu class="nx-profile-menu pt-0">
        <li><span class="nx-profile-header">Tài khoản</span></li>
        <li><a cDropdownItem routerLink="/dashboard">Bảng điều khiển</a></li>
        <li>
          <a cDropdownItem routerLink="/system/users">Quản trị người dùng</a>
        </li>
        <li>
          <a cDropdownItem routerLink="/content/posts">Kiểm duyệt nội dung</a>
        </li>
      </ul>
    </c-dropdown>
  </c-container>
</c-header>
