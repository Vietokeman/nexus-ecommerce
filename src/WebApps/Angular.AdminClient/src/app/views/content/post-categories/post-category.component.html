<div class="animated fadeIn nx-content-page nx-category-page">
  <p-panel #pnl [style]="{'margin-bottom':'10px'}" class="nx-content-panel">
    <p-header>
      <div class="nx-panel-head">
        <div>
          <span class="nx-head-overline">Content taxonomy</span>
          <h3 class="nx-head-title">Quản lý loại bài viết</h3>
        </div>
      </div>
    </p-header>

    <div class="nx-toolbar">
      <div class="nx-toolbar-actions">
        <button
          appPermission
          appPolicy="Permissons.PostCategories.Create"
          pButton
          type="button"
          label="Thêm"
          icon="fa fa-plus"
          (click)="showAddModal()"
          class="p-button-sm p-button-info"
        ></button>
        <button
          appPermission
          appPolicy="Permissons.PostCategories.Delete"
          pButton
          type="button"
          label="Xóa"
          icon="fa fa-trash"
          class="p-button-sm p-button-danger"
          *ngIf="selectedItems.length > 0"
          (click)="deleteItems()"
        ></button>
        <button
          appPermission
          appPolicy="Permissons.PostCategories.Edit"
          pButton
          type="button"
          label="Sửa"
          icon="fa fa-edit"
          class="p-button-sm p-button-warning"
          *ngIf="selectedItems.length == 1"
          (click)="showEditModal()"
        ></button>
      </div>

      <div class="nx-toolbar-filters">
        <input
          id="txtKeyword"
          pInputText
          (keyup.enter)="loadData()"
          [(ngModel)]="keyword"
          placeholder="Nhập tên danh mục..."
          type="text"
        />
        <button type="button" pButton (click)="loadData()" class="p-button-outlined">Tìm</button>
      </div>
    </div>

    <div class="nx-table-wrap">
      <p-table
        #dt
        [value]="items"
        selectionMode="multiple"
        dataKey="id"
        [(selection)]="selectedItems"
        [metaKeySelection]="true"
        [responsive]="true"
      >
        <ng-template pTemplate="header">
          <tr>
            <th style="width: 10px">
              <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
            </th>
            <th>Tên</th>
            <th>URL</th>
            <th>Thứ tự</th>
            <th style="width: 150px">Trạng thái</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-row>
          <tr [pSelectableRow]="row">
            <td style="width: 10px">
              <span class="ui-column-title"></span>
              <p-tableCheckbox [value]="row"></p-tableCheckbox>
            </td>
            <td>{{row.name}}</td>
            <td>{{row.slug}}</td>
            <td>{{row.sortOrder | number}}</td>
            <td style="width: 150px">
              <p-badge *ngIf="row.isActive == 1" value="Kích hoạt" severity="success"></p-badge>
              <p-badge *ngIf="row.isActive == 0" value="Khoá" severity="danger"></p-badge>
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="summary">
          <div class="nx-summary">Tổng số: {{totalCount | number}}</div>
        </ng-template>
      </p-table>
    </div>

    <p-paginator
      [rows]="pageSize"
      [totalRecords]="totalCount"
      (onPageChange)="pageChanged($event)"
      [rowsPerPageOptions]="[10, 20, 50, 100]"
    ></p-paginator>

    <p-blockUI [target]="pnl" [blocked]="blockedPanel">
      <p-progressSpinner
        [style]="{width: '100px', height: '100px', position:'absolute', top:'25%', left:'50%'}"
        strokeWidth="2"
        animationDuration=".5s"
      ></p-progressSpinner>
    </p-blockUI>
  </p-panel>
</div>
