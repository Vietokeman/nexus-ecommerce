# ==============================================================================
# DEVELOPMENT OVERRIDE - Hot Reload Mode
# ==============================================================================
# Sử dụng SDK image + Volume Mapping + dotnet watch run
# Khi sửa code trên máy host, container tự động rebuild & reload.
#
# CÁCH DÙNG:
#   docker compose up -d                    → Dev mode (hot-reload)
#   docker compose -f docker-compose.yml up → Production mode (Dockerfile build)
# ==============================================================================

services:
  # ==================== DATABASE & INFRASTRUCTURE ====================
  nexusdb:
    container_name: src-nexusdb
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-your_secure_password_here}
      - POSTGRES_DB=NexusDb
    restart: always
    ports:
      - "5433:5432"
    volumes:
      - nexusdb_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d NexusDb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nexusaidb:
    container_name: src-nexusaidb
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-your_secure_password_here}
      - POSTGRES_DB=NexusAiDb
    restart: always
    ports:
      - "5436:5432"
    volumes:
      - nexusaidb_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d NexusAiDb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  basketdb:
    container_name: src-basketdb
    restart: always
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    container_name: src-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  pgadmin:
    container_name: src-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@tedu-microservice.com
      - PGADMIN_DEFAULT_PASSWORD=admin1234
    restart: always
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    deploy:
      resources:
        limits:
          memory: 256M

  portainer:
    container_name: src-portainer
    restart: always
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    profiles:
      - tools
    deploy:
      resources:
        limits:
          memory: 128M

  elasticsearch:
    container_name: src-elasticsearch
    environment:
      - xpack.monitoring.enabled=false
      - xpack.watcher.enabled=false
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - discovery.type=single-node
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  kibana:
    container_name: src-kibana
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_PUBLICBASEURL=http://localhost:5601
      - NODE_OPTIONS=--max-old-space-size=1024
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    deploy:
      resources:
        limits:
          memory: 512M

  # ==================== MICROSERVICES (SDK + Volume + Hot Reload) ====================
  # Mỗi service dùng .NET SDK image, mount code từ host, chạy dotnet watch run.
  # Khi sửa file .cs/.json trên máy → container tự detect & rebuild.

  product.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-product-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/Product.API
    command: dotnet run --no-launch-profile
    depends_on:
      nexusdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  customer.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-customer-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/Customer.API
    command: dotnet run --no-launch-profile
    depends_on:
      nexusdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  basket.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-basket-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/Basket.API
    command: dotnet run --no-launch-profile
    depends_on:
      basketdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  ordering.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-ordering-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/Ordering/Ordering.API
    command: dotnet run --no-launch-profile
    depends_on:
      nexusdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  inventory.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-inventory-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_HTTPS_PORTS=443
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/Inventory.Product.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      nexusdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  payment.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-payment-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/Payment.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      nexusdb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  hangfire.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-hangfire-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/Hangfire.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      nexusdb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  identity.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-identity-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/Identity.API
    command: dotnet run --no-launch-profile
    depends_on:
      nexusdb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  flashsale.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-flashsale-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/FlashSale.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      nexusdb:
        condition: service_healthy
      basketdb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  groupbuy.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-groupbuy-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/GroupBuy.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      nexusdb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  seller.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-seller-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/Seller.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      nexusdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  nexus.ai.service:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-nexus-ai-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/Nexus.AI.Service
    command: dotnet watch run --no-launch-profile
    depends_on:
      nexusaidb:
        condition: service_healthy
      product.api:
        condition: service_started
    ports:
      - "6013:80"
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  admin.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-admin-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/Services/Admin.API
    command: dotnet watch run --no-launch-profile
    ports:
      - "6014:80"
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  # ==================== API GATEWAY (SDK + Volume + Hot Reload) ====================
  ocelot.apigw:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-ocelot-apigw
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "ElasticConfiguration:Uri=http://elasticsearch:9200"
    volumes:
      - .:/src
    working_dir: /src/APIGateWays/OcelotApiGw
    command: dotnet run --no-launch-profile
    depends_on:
      - product.api
      - customer.api
      - basket.api
      - ordering.api
      - inventory.api
      - payment.api
      - identity.api
      - flashsale.api
      - groupbuy.api
      - seller.api
      - nexus.ai.service
      - admin.api
      - elasticsearch
    ports:
      - "5000:80"
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  # ==================== FRONTEND (Node + Vite Dev Server + Hot Reload) ====================
  # React Client chạy Vite dev server với HMR (Hot Module Replacement)
  # Sửa file .tsx/.ts/.css → browser tự cập nhật ngay lập tức
  react.client:
    image: node:20-alpine
    container_name: src-react-client
    environment:
      - VITE_API_PROXY_TARGET=http://ocelot.apigw:80
    volumes:
      - ./WebApps/React.Client:/app
      - react_node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - ocelot.apigw
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  angular.admin.client:
    image: node:20-alpine
    container_name: src-angular-admin-client
    environment:
      - NODE_OPTIONS=--max-old-space-size=3072
    volumes:
      - ./WebApps/Angular.AdminClient:/app
      - angular_admin_node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0"
    depends_on:
      - ocelot.apigw
    ports:
      - "4201:4201"
    deploy:
      resources:
        limits:
          memory: 2G
    restart: always

  # ==================== HEALTH DASHBOARD (SDK + Volume + Hot Reload) ====================
  webhealthstatus:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-webhealthstatus
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/WebApps/WebHealthStatus
    command: dotnet watch run --no-launch-profile
    depends_on:
      - ocelot.apigw
    ports:
      - "6010:80"
    deploy:
      resources:
        limits:
          memory: 256M
    restart: always
