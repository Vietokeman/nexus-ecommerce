version: "3.8"

services:
  #database section — unified PostgreSQL + PostGIS (nexusdb)
  nexusdb:
    container_name: nexusdb
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin1234
      - POSTGRES_DB=NexusDb
    restart: always
    ports:
      - "5433:5432"
    volumes:
      - nexusdb_data:/var/lib/postgresql/data

  #basketdb: redis (also used for FlashSale Lua Script stock)
  basketdb:
    container_name: basketdb
    restart: always
    ports:
      - "6379:6379"

  #infrastructure section
  rabbitmq:
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  pgadmin:
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@tedu-microservice.com
      - PGADMIN_DEFAULT_PASSWORD=admin1234
    restart: always
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/root/pgadmin
  # web ui for docker compose
  portainer:
    container_name: portainer
    restart: always
    ports:
      - "8080:8080"
      - "9000:9000"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
  # elasticsearch and kibana section
  elasticsearch:
    container_name: elasticsearch
    environment:
      - xpack.monitoring.enabled=true
      - xpack.watcher.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - discovery.type=single-node
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    container_name: kibana
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
  # ==================== MICROSERVICES API SECTIONS ====================
  # Note: Microservices do NOT expose ports directly
  # All traffic must go through Ocelot API Gateway on port 5000
  
  product.api:
    container_name: product.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AspNetCore_Urls=http://+:80
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=ProductDb;Username=admin;Password=admin1234;"
    depends_on:
      - nexusdb
    # ports: # REMOVED - Access via Gateway only
    #   - "6002:80"
    restart: always
    
  customer.api:
    container_name: customer.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AspNetCore_Urls=http://+:80
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=CustomerDb;Username=admin;Password=admin1234;"
    depends_on:
      - nexusdb
    # ports: # REMOVED - Access via Gateway only
    #   - "6003:80"
    restart: always

  # basket api sections
  basket.api:
    container_name: basket.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AspNetCore_Urls=http://+:80
      - "CacheSettings:ConnectionString=basketdb:6379"
    depends_on:
      - basketdb
    # ports: # REMOVED - Access via Gateway only
    #   - "6004:80"
    restart: always

  # ordering api sections
  ordering.api:
    container_name: ordering.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AspNetCore_Urls=http://+:80
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=OrderDb;Username=admin;Password=admin1234;"
    depends_on:
      - nexusdb
    # ports: # REMOVED - Access via Gateway only
    #   - "6005:80"
    restart: always

  inventory.api:
    container_name: inventory.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ASPNETCORE_HTTPS_PORTS=443
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=InventoryDb;Username=admin;Password=admin1234;"
    depends_on:
      - nexusdb
    # ports: # REMOVED - Access via Gateway only
    #   - "6006:80"
    #   - "5005:5005" # gRPC port also internal
    restart: always

  # payment api sections
  payment.api:
    container_name: payment.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AspNetCore_Urls=http://+:80
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=PaymentDb;Username=admin;Password=admin1234;"
      - "EventBusSettings:HostAddress=amqp://guest:guest@rabbitmq:5672"
      - "PayOSSettings:ClientId=change_me_with_payos_client_id"
      - "PayOSSettings:ApiKey=change_me_with_payos_api_key"
      - "PayOSSettings:ChecksumKey=change_me_with_payos_checksum_key"
      - "PayOSSettings:WebReturnUrl=http://localhost:3000/payment/success"
      - "PayOSSettings:WebCancelUrl=http://localhost:3000/payment/cancel"
      - "SmtpSettings:Host=smtp.gmail.com"
      - "SmtpSettings:Port=587"
      - "SmtpSettings:UserName=vietbmt19@gmail.com"
      - "SmtpSettings:Password=change_me_with_smtp_password"
      - "Serilog:Using:0=Serilog.Sinks.Elasticsearch"
      - "Serilog:WriteTo:0:Args:nodeUris=http://elasticsearch:9200"
    depends_on:
      - nexusdb
      - rabbitmq
      - elasticsearch
    # ports: # REMOVED - Access via Gateway only
    #   - "6007:80"
    restart: always

  # hangfire api sections
  hangfire.api:
    container_name: hangfire.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AspNetCore_Urls=http://+:80
      - "ConnectionStrings:HangfireConnection=Host=nexusdb;Port=5432;Database=HangfireDb;Username=admin;Password=admin1234;"
      - "SmtpSettings:Host=smtp.gmail.com"
      - "SmtpSettings:Port=587"
      - "SmtpSettings:UserName=vietbmt19@gmail.com"
      - "SmtpSettings:Password=change_me_with_smtp_password"
      - "GatewayUrl=http://ocelot.apigw:80"
      - "ElasticConfiguration:Uri=http://elasticsearch:9200"
    depends_on:
      - nexusdb
      - elasticsearch
    # ports: # REMOVED - Access via Gateway only (except Hangfire dashboard - keep for admin access)
    #   - "6008:80"
    restart: always

  # identity api sections
  identity.api:
    container_name: identity.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AspNetCore_Urls=http://+:80
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=IdentityDb;Username=admin;Password=admin1234;"
      - "JwtSettings:Secret=YourSuperSecretKeyHere_MustBeAtLeast32Characters!"
      - "JwtSettings:Issuer=distributed-ecommerce-platform"
      - "JwtSettings:Audience=distributed-ecommerce-client"
      - "SmtpSettings:Host=smtp.gmail.com"
      - "SmtpSettings:Port=587"
      - "SmtpSettings:UserName=vietbmt19@gmail.com"
      - "SmtpSettings:Password=change_me_with_smtp_password"
      - "ElasticConfiguration:Uri=http://elasticsearch:9200"
    depends_on:
      - nexusdb
      - elasticsearch
    # ports: # REMOVED - Access via Gateway only
    #   - "6009:80"
    restart: always

  # flash sale api (Redis Lua Script + PostgreSQL)
  flashsale.api:
    container_name: flashsale.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AspNetCore_Urls=http://+:80
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=FlashSaleDb;Username=admin;Password=admin1234;"
      - "ConnectionStrings:Redis=basketdb:6379"
      - "ElasticConfiguration:Uri=http://elasticsearch:9200"
    depends_on:
      - nexusdb
      - basketdb
      - elasticsearch
    # ports: # REMOVED - Access via Gateway only
    #   - "6011:80"
    restart: always

  # group buy api (Pinduoduo social buying model)
  groupbuy.api:
    container_name: groupbuy.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AspNetCore_Urls=http://+:80
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=GroupBuyDb;Username=admin;Password=admin1234;"
      - "EventBusSettings:HostAddress=amqp://guest:guest@rabbitmq:5672"
      - "ElasticConfiguration:Uri=http://elasticsearch:9200"
    depends_on:
      - nexusdb
      - rabbitmq
      - elasticsearch
    # ports: # REMOVED - Access via Gateway only
    #   - "6012:80"
    restart: always

  # ==================== API GATEWAY ====================
  # This is the ONLY entry point for all API requests
  ocelot.apigw:
    container_name: ocelot.apigw
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AspNetCore_Urls=http://+:80
      - "ElasticConfiguration:Uri=http://elasticsearch:9200"
    depends_on:
      - product.api
      - customer.api
      - basket.api
      - ordering.api
      - inventory.api
      - payment.api
      - identity.api
      - flashsale.api
      - groupbuy.api
      - elasticsearch
    ports:
      - "5000:80"  # ⭐ MAIN API ENTRY POINT - All microservices accessible via http://localhost:5000
    restart: always

  # ==================== WEB APPLICATIONS ====================
  react.client:
    container_name: react.client
    depends_on:
      - ocelot.apigw
    ports:
      - "3000:80"  # Frontend application
    restart: always

  webhealthstatus:
    container_name: webhealthstatus
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AspNetCore_Urls=http://+:80
    depends_on:
      - ocelot.apigw
    ports:
      - "6010:80"  # Health monitoring dashboard
    restart: always
