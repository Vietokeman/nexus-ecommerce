# ==============================================================================
# DEVELOPMENT OVERRIDE - Hot Reload Mode
# ==============================================================================
# Sử dụng SDK image + Volume Mapping + dotnet watch run
# Khi sửa code trên máy host, container tự động rebuild & reload.
#
# CÁCH DÙNG:
#   docker compose up -d                    → Dev mode (hot-reload)
#   docker compose -f docker-compose.yml up → Production mode (Dockerfile build)
# ==============================================================================

services:
  # ==================== DATABASE & INFRASTRUCTURE ====================
  nexusdb:
    container_name: src-nexusdb
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin1234
      - POSTGRES_DB=NexusDb
    restart: always
    ports:
      - "5433:5432"
    volumes:
      - nexusdb_data:/var/lib/postgresql/data

  basketdb:
    container_name: src-basketdb
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    container_name: src-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  pgadmin:
    container_name: src-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@tedu-microservice.com
      - PGADMIN_DEFAULT_PASSWORD=admin1234
    restart: always
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/root/pgadmin

  portainer:
    container_name: src-portainer
    restart: always
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  elasticsearch:
    container_name: src-elasticsearch
    environment:
      - xpack.monitoring.enabled=true
      - xpack.watcher.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - discovery.type=single-node
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    container_name: src-kibana
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"

  # ==================== MICROSERVICES (SDK + Volume + Hot Reload) ====================
  # Mỗi service dùng .NET SDK image, mount code từ host, chạy dotnet watch run.
  # Khi sửa file .cs/.json trên máy → container tự detect & rebuild.

  product.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-product-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=ProductDb;Username=admin;Password=admin1234;"
    volumes:
      - .:/src
    working_dir: /src/Services/Product.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      - nexusdb
    restart: always

  customer.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-customer-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=CustomerDb;Username=admin;Password=admin1234;"
    volumes:
      - .:/src
    working_dir: /src/Services/Customer.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      - nexusdb
    restart: always

  basket.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-basket-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "CacheSettings:ConnectionString=basketdb:6379"
    volumes:
      - .:/src
    working_dir: /src/Services/Basket.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      - basketdb
    restart: always

  ordering.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-ordering-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=OrderDb;Username=admin;Password=admin1234;"
    volumes:
      - .:/src
    working_dir: /src/Services/Ordering/Ordering.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      - nexusdb
    restart: always

  inventory.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-inventory-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_HTTPS_PORTS=443
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=InventoryDb;Username=admin;Password=admin1234;"
    volumes:
      - .:/src
    working_dir: /src/Services/Inventory.Product.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      - nexusdb
    restart: always

  payment.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-payment-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=PaymentDb;Username=admin;Password=admin1234;"
      - "EventBusSettings:HostAddress=amqp://guest:guest@rabbitmq:5672"
      - "PayOSSettings:ClientId=change_me_with_payos_client_id"
      - "PayOSSettings:ApiKey=change_me_with_payos_api_key"
      - "PayOSSettings:ChecksumKey=change_me_with_payos_checksum_key"
      - "PayOSSettings:WebReturnUrl=http://localhost:3000/payment/success"
      - "PayOSSettings:WebCancelUrl=http://localhost:3000/payment/cancel"
      - "SmtpSettings:Host=smtp.gmail.com"
      - "SmtpSettings:Port=587"
      - "SmtpSettings:UserName=vietbmt19@gmail.com"
      - "SmtpSettings:Password=change_me_with_smtp_password"
      - "Serilog:Using:0=Serilog.Sinks.Elasticsearch"
      - "Serilog:WriteTo:0:Args:nodeUris=http://elasticsearch:9200"
    volumes:
      - .:/src
    working_dir: /src/Services/Payment.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      - nexusdb
      - rabbitmq
      - elasticsearch
    restart: always

  hangfire.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-hangfire-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "ConnectionStrings:HangfireConnection=Host=nexusdb;Port=5432;Database=HangfireDb;Username=admin;Password=admin1234;"
      - "SmtpSettings:Host=smtp.gmail.com"
      - "SmtpSettings:Port=587"
      - "SmtpSettings:UserName=vietbmt19@gmail.com"
      - "SmtpSettings:Password=change_me_with_smtp_password"
      - "GatewayUrl=http://ocelot.apigw:80"
      - "ElasticConfiguration:Uri=http://elasticsearch:9200"
    volumes:
      - .:/src
    working_dir: /src/Services/Hangfire.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      - nexusdb
      - elasticsearch
    restart: always

  identity.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-identity-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=IdentityDb;Username=admin;Password=admin1234;"
      - "JwtSettings:Secret=YourSuperSecretKeyHere_MustBeAtLeast32Characters!"
      - "JwtSettings:Issuer=distributed-ecommerce-platform"
      - "JwtSettings:Audience=distributed-ecommerce-client"
      - "SmtpSettings:Host=smtp.gmail.com"
      - "SmtpSettings:Port=587"
      - "SmtpSettings:UserName=vietbmt19@gmail.com"
      - "SmtpSettings:Password=change_me_with_smtp_password"
      - "ElasticConfiguration:Uri=http://elasticsearch:9200"
    volumes:
      - .:/src
    working_dir: /src/Services/Identity.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      - nexusdb
      - elasticsearch
    restart: always

  flashsale.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-flashsale-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=FlashSaleDb;Username=admin;Password=admin1234;"
      - "ConnectionStrings:Redis=basketdb:6379"
      - "ElasticConfiguration:Uri=http://elasticsearch:9200"
    volumes:
      - .:/src
    working_dir: /src/Services/FlashSale.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      - nexusdb
      - basketdb
      - elasticsearch
    restart: always

  groupbuy.api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-groupbuy-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "ConnectionStrings:DefaultConnectionString=Host=nexusdb;Port=5432;Database=GroupBuyDb;Username=admin;Password=admin1234;"
      - "EventBusSettings:HostAddress=amqp://guest:guest@rabbitmq:5672"
      - "ElasticConfiguration:Uri=http://elasticsearch:9200"
    volumes:
      - .:/src
    working_dir: /src/Services/GroupBuy.API
    command: dotnet watch run --no-launch-profile
    depends_on:
      - nexusdb
      - rabbitmq
      - elasticsearch
    restart: always

  # ==================== API GATEWAY (SDK + Volume + Hot Reload) ====================
  ocelot.apigw:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-ocelot-apigw
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
      - "ElasticConfiguration:Uri=http://elasticsearch:9200"
    volumes:
      - .:/src
    working_dir: /src/APIGateWays/OcelotApiGw
    command: dotnet watch run --no-launch-profile
    depends_on:
      - product.api
      - customer.api
      - basket.api
      - ordering.api
      - inventory.api
      - payment.api
      - identity.api
      - flashsale.api
      - groupbuy.api
      - elasticsearch
    ports:
      - "5000:80"
    restart: always

  # ==================== FRONTEND (Node + Vite Dev Server + Hot Reload) ====================
  # React Client chạy Vite dev server với HMR (Hot Module Replacement)
  # Sửa file .tsx/.ts/.css → browser tự cập nhật ngay lập tức
  react.client:
    image: node:20-alpine
    container_name: src-react-client
    environment:
      - VITE_API_PROXY_TARGET=http://ocelot.apigw:80
    volumes:
      - ./WebApps/React.Client:/app
      - react_node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - ocelot.apigw
    ports:
      - "3000:3000"
    restart: always

  # ==================== HEALTH DASHBOARD (SDK + Volume + Hot Reload) ====================
  webhealthstatus:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: src-webhealthstatus
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=1
    volumes:
      - .:/src
    working_dir: /src/WebApps/WebHealthStatus
    command: dotnet watch run --no-launch-profile
    depends_on:
      - ocelot.apigw
    ports:
      - "6010:80"
    restart: always
